name: Auto Article

on:
  schedule:
    # Mon/Wed/Fri 05:00 Turkey (UTC+3) ≈ 02:00 UTC
    - cron: "0 2 * * 1,3,5"
  workflow_dispatch:

concurrency:
  group: auto-article-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  generate-article:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "24"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Generate article with Gemini
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          SITE_BASE_URL: https://turkestatelegal.com
        run: node scripts/generate-article.mjs

      - name: Prepare Instagram draft and single post image
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          IG_USER_ID: ${{ secrets.IG_USER_ID }}
          IG_ACCESS_TOKEN: ${{ secrets.IG_ACCESS_TOKEN }}
          SITE_BASE_URL: https://turkestatelegal.com
          FB_PAGE_ID: "1097982366728133"
        run: node scripts/publish-instagram.mjs

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add content/articles/ public/sitemap.xml social-drafts/instagram/ public/social/instagram/
          if git diff --staged --quiet; then
            echo "No article changes to commit."
            exit 0
          fi
          git commit -m "chore: add auto-generated SEO article ($(date -u +%Y-%m-%d))"

          max_attempts=5
          for attempt in $(seq 1 "$max_attempts"); do
            echo "Push attempt ${attempt}/${max_attempts}"
            git fetch origin main
            if ! git pull --rebase origin main; then
              echo "Rebase failed; aborting rebase."
              git rebase --abort || true
              exit 1
            fi
            if git push origin HEAD:main; then
              echo "Push succeeded."
              exit 0
            fi
            echo "Push rejected; retrying after short wait..."
            sleep $((attempt * 10))
          done
          echo "Push failed after ${max_attempts} attempts."
          exit 1

      - name: Publish to Instagram
        continue-on-error: true
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          IG_USER_ID: ${{ secrets.IG_USER_ID }}
          IG_ACCESS_TOKEN: ${{ secrets.IG_ACCESS_TOKEN }}
          SITE_BASE_URL: https://turkestatelegal.com
          FB_PAGE_ID: "1097982366728133"
          IG_IMAGE_URL_POLL_ATTEMPTS: "20"
          IG_IMAGE_URL_POLL_INTERVAL_MS: "30000"
        run: node scripts/publish-instagram.mjs --publish-only
