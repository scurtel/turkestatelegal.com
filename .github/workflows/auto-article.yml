name: Auto Article

on:
  schedule:
    # Mon/Wed/Fri 05:00 Turkey (UTC+3) ≈ 02:00 UTC
    - cron: "0 2 * * 1,3,5"
  workflow_dispatch:

concurrency:
  group: auto-article-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  generate-article:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "24"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Generate article with Gemini
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: node scripts/generate-article.mjs

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add content/articles/ public/sitemap.xml
          if git diff --staged --quiet; then
            echo "No article changes to commit."
            exit 0
          fi
          git commit -m "chore: add auto-generated SEO article ($(date -u +%Y-%m-%d))"
          git push
